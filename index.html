
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حقيبة الاختبارات — الثانوية الثالثة بالخبر</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      direction: rtl;
      min-height: 100vh;
      background-color: #0f4c75;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(0,188,212,0.25) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,150,136,0.25) 0%, transparent 50%),
        linear-gradient(135deg, #0f4c75 0%, #1b6ca8 40%, #0a7373 80%, #0d9488 100%);
      background-attachment: fixed;
    }

    header {
      background: rgba(255,255,255,0.20);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.30);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-logo { width: 60px; height: 60px; object-fit: contain; flex-shrink: 0; }
    .header-title { font-size: 22px; font-weight: 800; color: #0c3461; }
    .header-sub   { font-size: 13px; font-weight: 600; color: #1a5276; margin-top: 2px; }
    .header-meta  { font-size: 11px; color: #1a6b96; margin-top: 2px; }

    .tabs-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 8px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs-wrap::-webkit-scrollbar { display: none; }
    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      background: transparent;
      color: #1a5276;
      border-radius: 12px 12px 0 0;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover  { background: rgba(255,255,255,0.35); }
    .tab-btn.active { background: #fff; color: #1a5276; box-shadow: 0 -2px 8px rgba(0,0,0,0.06); }
    .tab-icon { width: 16px; height: 16px; }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 14px 48px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: box-shadow 0.2s, background 0.2s;
    }
    .card:hover { background: rgba(255,255,255,0.88); box-shadow: 0 6px 24px rgba(0,0,0,0.13); }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .section-bar {
      width: 6px;
      height: 32px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .section-head h2 { font-size: 18px; font-weight: 800; color: #1e293b; }

    .cover-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
    }
    .cover-main-card {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 36px 28px;
      margin-bottom: 16px;
    }
    .cover-logo { width: 88px; height: 88px; object-fit: contain; margin: 0 auto 16px; display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15)); }
    .cover-title { font-size: 28px; font-weight: 800; color: #0c3461; margin-bottom: 6px; }
    .cover-school { font-weight: 700; font-size: 16px; color: #1a5276; }
    .cover-stage  { font-weight: 500; font-size: 14px; color: #1a6b96; margin-top: 4px; }
    .cover-semester { font-size: 13px; color: #2980b9; margin-top: 4px; }
    .divider { height: 1px; background: linear-gradient(to left, transparent, #93c5fd, transparent); margin: 20px 0; }
    .cover-motto {
      background: linear-gradient(135deg, #eff6ff, #f0fdf4);
      border: 1px solid #bae6fd;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: right;
    }
    .motto-star {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0ea5e9, #0d9488);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      font-size: 18px;
    }
    .motto-text { font-size: 13px; font-weight: 700; color: #0c3461; line-height: 1.8; }
    .motto-sub  { font-weight: 500; color: #1a6b96; }

    .link-btn {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(to left, #0369a1, #0d9488);
      border-radius: 18px;
      padding: 16px 18px;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      margin-bottom: 20px;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .link-btn:hover { filter: brightness(1.08); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.22); }
    .link-btn:active { transform: scale(0.97); }

      border-radius: 12px;
